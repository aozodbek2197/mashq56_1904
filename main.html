<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>6. Theme Switcher</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; transition: 0.4s; }
    .dark { background: #121212; color: #fff; }
    .container { max-width: 600px; margin: auto; text-align: center; }
    button { padding: 12px 25px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Theme Switcher</h1>
    <p>Hozirgi holat: <strong id="status">Light</strong></p>
    <button onclick="toggleTheme()">Dark / Light Mode</button>
  </div>

  <script>
    const body = document.body;
    const status = document.getElementById('status');

    function toggleTheme() {
      body.classList.toggle('dark');
      const isDark = body.classList.contains('dark');
      status.textContent = isDark ? 'Dark' : 'Light';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // Saqlangan theme ni yuklash
    if (localStorage.getItem('theme') === 'dark') {
      body.classList.add('dark');
      status.textContent = 'Dark';
    }
  </script>
</body>
</html>
